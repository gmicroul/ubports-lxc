# ========================
# Fedora 42 容器配置（Ubuntu Touch 26.04）
# ========================

lxc.rootfs.path = /var/lib/lxc/fedora42/rootfs
lxc.uts.name = fedora42

# 日志
lxc.log.level = 3
lxc.log.file = /tmp/fedora42.log

# 网络（UT 无 lxcbr0，关掉）
# 独立 net/user namespace 防止网络冲突
lxc.net.0.type = none
lxc.namespace.keep = net user

# TTY 设置
lxc.tty.dir = lxc
lxc.tty.max = 4
lxc.pty.max = 1024

# 特权容器（sudo 管理）
lxc.idmap = u 0 0 65536
lxc.idmap = g 0 0 65536

# 安全设置（UT 内核 4.9 不支持的都关掉）
lxc.apparmor.profile = unconfined
lxc.cap.drop = mac_admin mac_override
lxc.autodev = 0

# Hook：启动前复制 Wayland socket 到 rootfs
lxc.hook.pre-start = /var/lib/lxc/fedora42-wayland-hook.sh pre-start
lxc.hook.post-stop = /var/lib/lxc/fedora42-wayland-hook.sh post-stop

# 禁用 BPF 设备 cgroup（UT 内核不支持）
lxc.cgroup2.devices.deny = a

# ========================
# 挂载配置
# ========================

# 基础文件系统
lxc.mount.entry = proc proc proc nodev,noexec,nosuid 0 0
lxc.mount.entry = sys sys sysfs nodev,noexec,nosuid 0 0

# /dev 系列
lxc.mount.entry = tmpfs dev tmpfs nosuid,mode=0755 0 0
lxc.mount.entry = dev/pts dev/pts devpts gid=5,mode=620,create=dir 0 0
lxc.mount.entry = dev/shm dev/shm tmpfs nosuid,nodev,create=dir 0 0
lxc.mount.entry = dev/mqueue dev/mqueue mqueue nodev,nosuid,noexec,create=dir 0 0

# GPU 和输入设备（从宿主 bind 进来）
lxc.mount.entry = /dev/dri dev/dri none bind,create=dir,optional 0 0
lxc.mount.entry = /dev/input dev/input none bind,create=dir,optional 0 0